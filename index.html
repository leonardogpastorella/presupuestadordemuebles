<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="assets/css/style.css">
    <script defer src="js/presupuesto.js"></script>
    <script defer src="js/main.js"></script>
    <title>Presupuesto de Muebles</title>
</head>
<body>

    <h1>Presupuestador de muebles a medida</h1>

    <div class="formulario">

        <h2>Datos del cliente</h2>
        <ul>
            <li><label> Nombre: </label></li>
            <input type="text" id="clienteNombre" >
            <li><label> Teléfono:</label></li>
            <input type="text" id="clienteTelefono" >
            <li><label> Email: </label></li>
            <input type="email" id="clienteEmail" >
        </ul>

        <ul>
        <li> <label>Mueble:</label>
        <select id="muebleSelect"></select></li>

        <li><label>Metros lineales:</label>
        <input type="number" id="metros" ></li>

        <li><label>Cajones:</label>
        <input type="number" id="cajones" ></li>

        <label for="formadepago">Forma de pago:</label>
        <select id="formadepago">
            <option value="efectivo">Efectivo</option>
            <option value="transferencia">Transferencia bancaria</option>
            <option value="tarjeta">Tarjeta de crédito</option>
        </select>

        </ul>

        <li><button id="calcularBtn">Calcular presupuesto</button></li>

    </div>

    <div id="resultado"></div>

    <section id="revisarPresupuesto">
    <h2> Revisar Presupuesto</h2>
    <div id="contenidoPresupuesto">
    <p>No hay presupuesto generado.</p>
    </div>
</section>



</body>

</html>
