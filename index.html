    <script defer src="js/main.js"></script>
    <title>Presupuesto de Muebles</title>

<body>

    <h1>Presupuestador de muebles a medida</h1>

    <div class="formulario">

        <ul>

        <li><label>Metros lineales:</label>

        <li><label>Cajones:</label>

        <li><button id="calcularBtn">Calcular presupuesto</button></li>
        </ul>

    </div>

    <div id="resultado"></div>

    <section id="revisarPresupuesto">

    <div id="contenidoPresupuesto">
    <p>No hay presupuesto generado.</p>
    </div>
</section>
